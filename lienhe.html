<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi lời nhắn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background:#f4f6f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .contact-container{
            background:white;
            width:100%;
            max-width:500px;
            padding:40px;
            border-radius:12px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#222;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:500;
            color:#444;
        }

        input, textarea{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            font-size:14px;
            font-family:inherit;
            transition:0.2s;
        }

        input:focus, textarea:focus{
            border-color:#1f6feb;
            outline:none;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            width:100%;
            padding:12px;
            background:#1f6feb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:15px;
            font-weight:500;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#174ea6;
        }

        .success-message{
            margin-top:15px;
            text-align:center;
            color:green;
            font-size:14px;
            display:none;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h2>Gửi lời nhắn</h2>

        <form id="contactForm">
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Lời nhắn</label>
                <textarea id="message" required></textarea>
            </div>

            <button type="submit">Gửi lời nhắn</button>
            <div class="success-message" id="successMessage">
                Gửi thành công! Cảm ơn bạn 💙
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById("contactForm");
        const successMessage = document.getElementById("successMessage");

        form.addEventListener("submit", function(e){
            e.preventDefault();
            successMessage.style.display = "block";
            form.reset();
        });
    </script>

</body>
</html>
